<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ESP32-CAM Live Stream</title>

    <style>
        body {
            background-color: #111;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding-top: 20px;
        }

        #stream {
            width: 90%;
            max-width: 600px;
            border: 3px solid #00ffcc;
            border-radius: 10px;
        }

        input {
            width: 260px;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #00ffcc;
            color: #111;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            margin-left: 5px;
        }

        button:hover {
            background-color: #00ddb3;
        }
    </style>
</head>
<body>

    <h1>ESP32‑CAM Live Stream</h1>

    <p>Write Camera IP:</p>

    <input id="ip" placeholder="EX:192.168.1.7 ">
    <button onclick="loadStream()">Video Stream</button>

    <br><br>

    <img id="stream" src="" alt="Camera Stream Will Appear Here">

    <script>
        function loadStream() {
            let ip = document.getElementById("ip").value;
            if (ip.trim() === "") {
                alert("Write IP first");
                return;
            }

            document.getElementById("stream").src =
                "http://" + ip + ":81/stream";
        }
    </script>

</body>
</html>
